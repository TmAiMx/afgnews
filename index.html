<!DOCTYPE html><html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Afgnews</title><style>

body{
margin:0;
font-family: Arial;
background:#f2f4f8;
}

/* Header */
header{
background:#0a2a5c;
color:white;
padding:25px;
text-align:center;
font-size:28px;
}

/* News Grid */
.news-box{
max-width:1000px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:20px;
}

/* Card */
.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card h2{
padding:15px;
font-size:20px;
}

.card p{
padding:0 15px 20px 15px;
color:#444;
}

</style></head><body><header>
Afgnews | اخبار فارسی
</header><div class="news-box"><div class="card">
<img src="https://via.placeholder.com/600x300">
<h2>عنوان خبر</h2>
<p>متن خبر اینجا نوشته می‌شود...</p>
</div></div></body>
</html>
